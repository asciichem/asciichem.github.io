name: Deploy site

on:
  push:
    branches: [main]
  pull_request:
  repository_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'

      # Checkout the gem into the workspace (NOT as a sibling). GitHub
      # Actions refuses paths that escape the workspace root.
      - name: Checkout asciichem-ruby
        uses: actions/checkout@v4
        with:
          repository: asciichem/asciichem-ruby
          path: .asciichem-ruby

      - name: Install asciichem gem
        working-directory: .asciichem-ruby
        run: |
          bundle install --jobs 4 --no-cache
          bundle exec rake install

      - name: Install npm dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
